<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GALACTIC STRIKER</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  #wrapper {
    position: relative;
    display: inline-block;
  }
  canvas {
    display: block;
    border: 1px solid #0ff;
    box-shadow: 0 0 30px #0ff, 0 0 60px rgba(0,255,255,0.3);
  }
</style>
</head>
<body>
<div id="wrapper"><canvas id="game"></canvas></div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Responsive sizing
const MAX_W = 480, MAX_H = 640;
function resize() {
  const s = Math.min(window.innerWidth / MAX_W, window.innerHeight / MAX_H, 1);
  canvas.style.width = (MAX_W * s) + 'px';
  canvas.style.height = (MAX_H * s) + 'px';
}
canvas.width = MAX_W; canvas.height = MAX_H;
resize();
window.addEventListener('resize', resize);

const W = MAX_W, H = MAX_H;

// ── Audio Engine ──────────────────────────────────────────────────
const AC = window.AudioContext || window.webkitAudioContext;
let ac;
function initAudio() {
  if (!ac) ac = new AC();
}
function playTone(freq, type, dur, vol=0.3, freqEnd=null) {
  if (!ac) return;
  try {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type; o.frequency.value = freq;
    if (freqEnd) o.frequency.linearRampToValueAtTime(freqEnd, ac.currentTime + dur);
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.start(); o.stop(ac.currentTime + dur);
  } catch(e) {}
}
function sndShoot()    { playTone(900,'square',0.08,0.12,400); }
function sndExplode(b) { playTone(b?120:200,'sawtooth',b?0.6:0.3,b?0.4:0.2,30); }
function sndHit()      { playTone(300,'square',0.1,0.15,150); }
function sndPower()    { playTone(440,'sine',0.4,0.2,880); }
function sndBomb()     { playTone(60,'sawtooth',0.8,0.5,20); }
function sndLevelUp()  { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.3,0.25),i*80)); }

// ── State ─────────────────────────────────────────────────────────
let state = 'title';
let score = 0, hiScore = +localStorage.getItem('gstriker_hi') || 0;
let lives = 3, bombs = 3, frame = 0;
let combo = 0, comboTimer = 0, multiplier = 1;
let shake = 0, flashAlpha = 0, flashColor = '#fff';
let bossActive = false, nextBossScore = 2000;
let stageNum = 1;

// ── Stars / Nebula ────────────────────────────────────────────────
const stars = Array.from({length:120}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  s: Math.random()*2+0.3, sp: Math.random()*2.5+0.5,
  bright: Math.random()
}));
const nebulas = Array.from({length:6}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  r: 60+Math.random()*80,
  hue: Math.floor(Math.random()*360),
  sp: 0.3+Math.random()*0.3
}));

// ── Player ────────────────────────────────────────────────────────
const player = {
  x: W/2, y: H-90, w: 34, h: 34,
  speed: 5, invincible: 0,
  powerLevel: 0,    // 0=single 1=double 2=triple 3=spread
  shieldHp: 0,
  laserCharge: 0,
  engineFlicker: 0
};

// ── Collections ───────────────────────────────────────────────────
let bullets=[], eBullets=[], enemies=[], boss=null, powerUps=[];
let particles=[], comboTexts=[], beams=[];

// ── Input ─────────────────────────────────────────────────────────
const keys = {};
let touchX = null, touchShooting = false;
let bombPressed = false;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','KeyZ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD'].includes(e.code)) e.preventDefault();
  if (e.code === 'Space' || e.code === 'KeyZ') {
    initAudio();
    if (state === 'title' || state === 'gameover') startGame();
  }
  if ((e.code === 'KeyX' || e.code === 'ShiftLeft') && state === 'play') useBomb();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('click', () => { initAudio(); if (state !== 'play') startGame(); });

let touches = {};
canvas.addEventListener('touchstart', e => {
  e.preventDefault(); initAudio();
  if (state !== 'play') { startGame(); return; }
  for (const t of e.changedTouches) {
    touches[t.identifier] = {x: mapTouchX(t), y: mapTouchY(t)};
  }
  updateTouchState();
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) touches[t.identifier] = {x: mapTouchX(t), y: mapTouchY(t)};
  updateTouchState();
}, {passive:false});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) delete touches[t.identifier];
  updateTouchState();
}, {passive:false});

function mapTouchX(t) {
  const r = canvas.getBoundingClientRect();
  return (t.clientX - r.left) * (W / r.width);
}
function mapTouchY(t) {
  const r = canvas.getBoundingClientRect();
  return (t.clientY - r.top) * (H / r.height);
}
function updateTouchState() {
  const ts = Object.values(touches);
  if (ts.length === 0) { touchX = null; touchShooting = false; return; }
  // lowest touch = move, upper half touch = bomb
  ts.sort((a,b)=>b.y-a.y);
  touchX = ts[0].x;
  touchShooting = true;
  if (ts.length > 1 && ts[1].y < H/2) useBomb();
}

let shootCooldown = 0, bombCooldown = 0;

function startGame() {
  state = 'play';
  score = 0; lives = 3; bombs = 3; frame = 0;
  combo = 0; comboTimer = 0; multiplier = 1;
  bossActive = false; nextBossScore = 2000; stageNum = 1;
  shake = 0; flashAlpha = 0;
  bullets=[]; eBullets=[]; enemies=[]; boss=null; powerUps=[];
  particles=[]; comboTexts=[]; beams=[];
  player.x=W/2; player.y=H-90;
  player.invincible=0; player.powerLevel=0;
  player.shieldHp=0; player.laserCharge=0;
  shootCooldown=0; bombCooldown=0;
}

function useBomb() {
  if (bombs <= 0 || bombCooldown > 0 || state !== 'play') return;
  bombs--;
  bombCooldown = 120;
  sndBomb();
  screenShake(20);
  screenFlash('#ff8800', 0.6);
  // Kill all enemy bullets
  eBullets = [];
  // Damage all enemies
  enemies.forEach(e => {
    e.hp -= 5;
    addExplosion(e.x, e.y, false);
  });
  enemies = enemies.filter(e => {
    if (e.hp <= 0) { score += e.scoreVal * multiplier; return false; }
    return true;
  });
  if (boss) {
    boss.hp -= 30;
    addExplosion(boss.x, boss.y, true);
    if (boss.hp <= 0) killBoss();
  }
  // Bomb shockwave particles
  for (let i=0;i<80;i++) {
    const a = (i/80)*Math.PI*2;
    particles.push({x:player.x,y:player.y,vx:Math.cos(a)*8,vy:Math.sin(a)*8,
      life:30,maxLife:30,color:'#ff8800',size:4,type:'spark'});
  }
}

// ── Enemy Spawning ────────────────────────────────────────────────
const ENEMY_DEFS = {
  grunt:  {w:26,h:26,hp:1,scoreVal:50,color:'#f80',speed:2,shootRate:160,pattern:'straight'},
  speeder:{w:22,h:22,hp:1,scoreVal:80,color:'#0f8',speed:4,shootRate:999,pattern:'zigzag'},
  tank:   {w:34,h:34,hp:4,scoreVal:150,color:'#f00',speed:1.2,shootRate:80,pattern:'straight'},
  sniper: {w:24,h:28,hp:2,scoreVal:120,color:'#88f',speed:1,shootRate:60,pattern:'aimed'},
  cruiser:{w:30,h:30,hp:3,scoreVal:100,color:'#f4f',speed:1.5,shootRate:100,pattern:'spread'}
};

function spawnEnemy() {
  const level = Math.floor(score/500)+1;
  const x = 30 + Math.random()*(W-60);
  let type = 'grunt';
  const r = Math.random();
  if (level>=2 && r<0.15) type='speeder';
  if (level>=3 && r<0.12) type='tank';
  if (level>=4 && r<0.10) type='sniper';
  if (level>=5 && r<0.08) type='cruiser';

  const def = ENEMY_DEFS[type];
  enemies.push({
    x, y: -30, w: def.w, h: def.h,
    hp: def.hp + Math.floor(level/3),
    maxHp: def.hp + Math.floor(level/3),
    type, scoreVal: def.scoreVal,
    color: def.color,
    speed: def.speed + level*0.15,
    shootTimer: Math.floor(Math.random()*120),
    shootRate: Math.max(40, def.shootRate - level*5),
    pattern: def.pattern,
    angle: 0, zigDir: 1, zigTimer: 0,
    formX: x, formOffset: 0
  });
}

function spawnFormation() {
  const count = 5 + Math.floor(Math.random()*4);
  const spacing = (W-80)/(count-1);
  for (let i=0;i<count;i++) {
    const x = 40+i*spacing;
    const def = ENEMY_DEFS['grunt'];
    enemies.push({
      x, y: -30 - i*15, w:def.w, h:def.h,
      hp:1, maxHp:1, type:'grunt', scoreVal:60,
      color:'#fa0', speed:2, shootTimer:60+i*20,
      shootRate:200, pattern:'straight',
      angle:0, zigDir:1, zigTimer:0
    });
  }
}

// ── Boss ──────────────────────────────────────────────────────────
function spawnBoss() {
  bossActive = true;
  sndLevelUp();
  screenFlash('#ff0', 0.8);
  const phase = Math.floor(stageNum/2)+1;
  boss = {
    x: W/2, y: -60, w: 80, h: 60,
    hp: 100 + phase*50, maxHp: 100+phase*50,
    phase, speed: 1.2+phase*0.2,
    angle: 0, moveTimer: 0, moveDir: 1,
    shootTimer: 0, shootPhase: 0,
    entryDone: false,
    color1: `hsl(${phase*60},100%,60%)`,
    color2: `hsl(${phase*60+120},100%,50%)`,
    scoreVal: 2000 + phase*500
  };
  enemies = [];
}

function killBoss() {
  screenShake(30);
  screenFlash('#fff', 1);
  sndExplode(true);
  score += boss.scoreVal * multiplier;
  addExplosion(boss.x, boss.y, true);
  for (let i=0;i<5;i++) {
    setTimeout(()=>{ if(boss) addExplosion(boss.x+randn(50), boss.y+randn(40), true); }, i*150);
  }
  // Drop power-ups
  for (let i=0;i<3;i++) spawnPowerUp(boss.x+randn(40), boss.y+randn(20));
  boss = null;
  bossActive = false;
  nextBossScore += 3000;
  stageNum++;
  sndLevelUp();
}

function randn(r) { return (Math.random()-0.5)*2*r; }

// ── Power-ups ─────────────────────────────────────────────────────
const POWERUP_TYPES = ['power','shield','bomb','life'];
const POWERUP_COLORS = {power:'#ff0',shield:'#0ff',bomb:'#f80',life:'#f0f'};
const POWERUP_LABELS = {power:'PWR',shield:'SLD',bomb:'BMB',life:'1UP'};

function spawnPowerUp(x, y) {
  const type = POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
  powerUps.push({x, y, type, vy:1.5, angle:0, life:300});
}

function collectPowerUp(p) {
  sndPower();
  screenFlash(POWERUP_COLORS[p.type], 0.3);
  switch(p.type) {
    case 'power':
      player.powerLevel = Math.min(3, player.powerLevel+1);
      addComboText(p.x, p.y, 'POWER UP!', '#ff0');
      break;
    case 'shield':
      player.shieldHp = Math.min(3, player.shieldHp+1);
      addComboText(p.x, p.y, 'SHIELD!', '#0ff');
      break;
    case 'bomb':
      bombs = Math.min(5, bombs+1);
      addComboText(p.x, p.y, 'BOMB!', '#f80');
      break;
    case 'life':
      lives = Math.min(5, lives+1);
      addComboText(p.x, p.y, '1UP!', '#f0f');
      break;
  }
}

// ── Explosions / Effects ─────────────────────────────────────────
function addExplosion(x, y, big, col=null) {
  const count = big ? 30 : 12;
  const colors = big ? ['#ff0','#f80','#f00','#fff'] : ['#0ff','#08f','#fff','#ff0'];
  for (let i=0;i<count;i++) {
    const a = Math.random()*Math.PI*2;
    const sp = Math.random()*(big?5:3)+0.5;
    particles.push({
      x, y,
      vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
      life: big?50:28, maxLife:big?50:28,
      color: col || colors[Math.floor(Math.random()*colors.length)],
      size: Math.random()*(big?6:4)+1, type:'spark'
    });
  }
  if (big) {
    // Shockwave ring
    particles.push({x,y,r:0,maxR:80,life:20,maxLife:20,type:'ring',color:'#ff8'});
  }
}

function addComboText(x, y, text, color='#ff0') {
  comboTexts.push({x, y, text, color, life:60, maxLife:60, vy:-1.5});
}

function screenShake(amount) { shake = Math.max(shake, amount); }
function screenFlash(color, alpha) { flashColor=color; flashAlpha=Math.max(flashAlpha,alpha); }

// ── Bullet helpers ────────────────────────────────────────────────
function fireBullets() {
  const lv = player.powerLevel;
  const by = player.y - player.h/2 - 4;
  const spd = 14;
  sndShoot();
  if (lv === 0) {
    bullets.push({x:player.x, y:by, vx:0, vy:-spd, w:4, h:10});
  } else if (lv === 1) {
    bullets.push({x:player.x-8, y:by, vx:0, vy:-spd, w:4, h:10});
    bullets.push({x:player.x+8, y:by, vx:0, vy:-spd, w:4, h:10});
  } else if (lv === 2) {
    bullets.push({x:player.x-12, y:by, vx:0, vy:-spd, w:4, h:10});
    bullets.push({x:player.x,    y:by, vx:0, vy:-spd, w:4, h:10});
    bullets.push({x:player.x+12, y:by, vx:0, vy:-spd, w:4, h:10});
  } else {
    // Spread shot
    [-0.3,-0.15,0,0.15,0.3].forEach(angle => {
      bullets.push({x:player.x, y:by,
        vx:Math.sin(angle)*spd, vy:-Math.cos(angle)*spd, w:4, h:10});
    });
  }
}

function fireEnemyBullet(ex, ey, pattern, spd=3.5) {
  const dx=player.x-ex, dy=player.y-ey;
  const dist=Math.hypot(dx,dy)||1;
  if (pattern==='straight') {
    eBullets.push({x:ex,y:ey,vx:0,vy:spd*1.2,w:7,h:7,color:'#f0f'});
  } else if (pattern==='aimed') {
    eBullets.push({x:ex,y:ey,vx:dx/dist*spd,vy:dy/dist*spd,w:6,h:6,color:'#88f'});
  } else if (pattern==='spread') {
    [-0.4,0,0.4].forEach(a=>{
      const angle=Math.atan2(dy,dx)+a;
      eBullets.push({x:ex,y:ey,vx:Math.cos(angle)*spd*0.9,vy:Math.sin(angle)*spd*0.9,w:6,h:6,color:'#f4f'});
    });
  }
}

// ── Boss shoot patterns ───────────────────────────────────────────
function fireBossPhase(b) {
  const p = b.shootPhase % 4;
  if (p===0) {
    // Aimed burst
    for(let i=0;i<3;i++) setTimeout(()=>{
      if(!boss) return;
      const dx=player.x-boss.x, dy=player.y-boss.y;
      const d=Math.hypot(dx,dy)||1;
      eBullets.push({x:boss.x,y:boss.y+boss.h/2,vx:dx/d*5,vy:dy/d*5,w:10,h:10,color:'#f00'});
    },i*100);
  } else if (p===1) {
    // Ring shot
    const count=12+b.phase*4;
    for(let i=0;i<count;i++){
      const a=(i/count)*Math.PI*2;
      eBullets.push({x:boss.x,y:boss.y,vx:Math.cos(a)*3,vy:Math.sin(a)*3,w:8,h:8,color:'#ff0'});
    }
  } else if (p===2) {
    // Spread streams
    for(let i=-2;i<=2;i++){
      eBullets.push({x:boss.x+i*15,y:boss.y+boss.h/2,vx:i*0.4,vy:4,w:8,h:8,color:'#0ff'});
    }
  } else {
    // Sniper aimed
    const dx=player.x-boss.x, dy=player.y-boss.y;
    const d=Math.hypot(dx,dy)||1;
    eBullets.push({x:boss.x,y:boss.y,vx:dx/d*8,vy:dy/d*8,w:12,h:12,color:'#fff'});
  }
  b.shootPhase++;
}

// ── Update ────────────────────────────────────────────────────────
function update() {
  frame++;

  stars.forEach(s=>{ s.y+=s.sp; if(s.y>H) s.y=-2; });
  nebulas.forEach(n=>{ n.y+=n.sp; if(n.y-n.r>H) n.y=-n.r; });

  if (shake>0) shake*=0.8;
  if (flashAlpha>0) flashAlpha-=0.03;
  if (bombCooldown>0) bombCooldown--;

  if (state!=='play') return;

  // Combo decay
  if (comboTimer>0) { comboTimer--; if(comboTimer===0){combo=0;multiplier=1;} }

  // Player movement
  const spd = player.speed + (player.powerLevel>2?1:0);
  if (touchX!==null) {
    const dx=touchX-player.x;
    if(Math.abs(dx)>2) player.x+=Math.sign(dx)*Math.min(spd*2,Math.abs(dx));
  } else {
    if((keys['ArrowLeft']||keys['KeyA'])&&player.x>player.w/2) player.x-=spd;
    if((keys['ArrowRight']||keys['KeyD'])&&player.x<W-player.w/2) player.x+=spd;
    if((keys['ArrowUp']||keys['KeyW'])&&player.y>player.h/2+20) player.y-=spd;
    if((keys['ArrowDown']||keys['KeyS'])&&player.y<H-player.h/2) player.y+=spd;
  }
  player.x=clamp(player.x,player.w/2,W-player.w/2);
  player.y=clamp(player.y,40,H-player.h/2);

  player.engineFlicker = (player.engineFlicker+1)%6;

  // Shooting
  shootCooldown--;
  const wantsShoot = keys['Space']||keys['KeyZ']||touchShooting;
  if (wantsShoot && shootCooldown<=0) {
    fireBullets();
    shootCooldown = Math.max(5, 10-player.powerLevel*2);
  }

  // Player bullets move
  bullets = bullets.filter(b=>{ b.x+=b.vx; b.y+=b.vy; return b.y>-20&&b.x>-20&&b.x<W+20; });

  // Spawn enemies / boss
  if (!bossActive) {
    if (score>=nextBossScore) {
      spawnBoss();
    } else {
      const rate=Math.max(28, 90-Math.floor(score/150)*4);
      if (frame%rate===0) spawnEnemy();
      if (frame%400===0 && score>500) spawnFormation();
      if (Math.random()<0.003 && score>1000) spawnPowerUp(30+Math.random()*(W-60), 0);
    }
  }

  // Update enemies
  enemies.forEach(e=>{
    e.y+=e.speed;
    e.angle+=0.04;
    if(e.pattern==='zigzag'){
      e.zigTimer++;
      if(e.zigTimer>30){e.zigDir*=-1;e.zigTimer=0;}
      e.x+=e.zigDir*3;
    }
    e.x=clamp(e.x,e.w/2,W-e.w/2);
    e.shootTimer--;
    if(e.shootTimer<=0){
      e.shootTimer=e.shootRate;
      fireEnemyBullet(e.x,e.y,e.pattern);
    }
  });

  // Update boss
  if (boss) {
    if (!boss.entryDone) {
      boss.y+=3;
      if(boss.y>=100){ boss.y=100; boss.entryDone=true; }
    } else {
      boss.moveTimer++;
      if(boss.moveTimer>80){ boss.moveDir*=-1; boss.moveTimer=0; }
      boss.x+=boss.moveDir*(boss.speed+(boss.phase-1)*0.5);
      boss.x=clamp(boss.x,boss.w/2,W-boss.w/2);
      boss.angle+=0.02;
      boss.shootTimer--;
      const shootInterval=Math.max(25,70-boss.phase*8-Math.floor((1-boss.hp/boss.maxHp)*20));
      if(boss.shootTimer<=0){
        boss.shootTimer=shootInterval;
        fireBossPhase(boss);
        sndShoot();
      }
    }
  }

  // Enemy bullets
  eBullets=eBullets.filter(b=>{ b.x+=b.vx; b.y+=b.vy; return b.x>-20&&b.x<W+20&&b.y>-20&&b.y<H+20; });

  // Power-ups
  powerUps=powerUps.filter(p=>{
    p.y+=p.vy; p.angle+=0.05; p.life--;
    if(p.life<=0||p.y>H+30) return false;
    if(Math.abs(p.x-player.x)<22&&Math.abs(p.y-player.y)<22){ collectPowerUp(p); return false; }
    return true;
  });

  // Collision: player bullets vs enemies
  bullets=bullets.filter(b=>{
    let hit=false;
    enemies=enemies.filter(e=>{
      if(!hit&&hitTest(b,e,4)){
        hit=true; e.hp--;
        addExplosion(b.x,b.y,false,'#ff0');
        if(e.hp<=0){
          registerKill(e.x,e.y,e.scoreVal,false);
          if(Math.random()<0.12) spawnPowerUp(e.x,e.y);
          return false;
        }
        sndHit();
      }
      return true;
    });
    if(!hit&&boss&&hitTest(b,boss,0)){
      hit=true; boss.hp--;
      addExplosion(b.x,b.y,false,'#ff0');
      if(boss.hp<=0) killBoss();
      else sndHit();
    }
    return !hit;
  });

  // Enemies exit screen (lose life)
  enemies=enemies.filter(e=>{
    if(e.y>H+40){
      loseLife();
      addExplosion(e.x,H-10,false,'#f00');
      return false;
    }
    return true;
  });

  // Enemy bullets vs player
  if(player.invincible<=0){
    eBullets=eBullets.filter(b=>{
      if(hitTest(b,player,8)){
        if(player.shieldHp>0){
          player.shieldHp--;
          sndHit();
          screenFlash('#0ff',0.4);
          addExplosion(b.x,b.y,false,'#0ff');
        } else {
          loseLife();
        }
        return false;
      }
      return true;
    });
    // Enemy body vs player
    enemies=enemies.filter(e=>{
      if(hitTest(e,player,10)){
        if(player.shieldHp>0){
          player.shieldHp--;
          screenFlash('#0ff',0.4);
          addExplosion(e.x,e.y,false,'#0ff');
        } else {
          loseLife();
        }
        registerKill(e.x,e.y,e.scoreVal,false);
        return false;
      }
      return true;
    });
  }

  if(player.invincible>0) player.invincible--;

  // Particles
  particles=particles.filter(p=>{
    p.life--;
    if(p.type==='ring'){p.r+=p.maxR/p.maxLife;return p.life>0;}
    p.x+=p.vx; p.y+=p.vy;
    p.vx*=0.93; p.vy*=0.93;
    return p.life>0;
  });

  comboTexts=comboTexts.filter(t=>{ t.y+=t.vy; t.life--; return t.life>0; });

  if(score>hiScore){ hiScore=score; localStorage.setItem('gstriker_hi',hiScore); }
}

function hitTest(a, b, margin) {
  return Math.abs(a.x-b.x)<(a.w+b.w)/2-margin && Math.abs(a.y-b.y)<(a.h+b.h)/2-margin;
}

function registerKill(x, y, val, big) {
  combo++;
  comboTimer=120;
  multiplier=1+Math.floor(combo/5)*0.5;
  const pts=Math.floor(val*multiplier);
  score+=pts;
  addExplosion(x,y,big);
  sndExplode(big);
  if(combo>0&&combo%5===0){
    addComboText(x,y,`COMBO x${combo}!  x${multiplier.toFixed(1)}`,`hsl(${combo*20},100%,60%)`);
    sndLevelUp();
  } else {
    addComboText(x,y,`+${pts}`,'#ff0');
  }
}

function loseLife() {
  lives--;
  player.invincible=150;
  player.powerLevel=Math.max(0,player.powerLevel-1);
  screenShake(15);
  screenFlash('#f00',0.6);
  addExplosion(player.x,player.y,false,'#f00');
  sndExplode(false);
  if(lives<=0) { state='gameover'; screenShake(25); }
}

function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

// ── Draw ──────────────────────────────────────────────────────────
function draw() {
  // Screen shake
  const sx=(Math.random()-0.5)*shake, sy=(Math.random()-0.5)*shake;
  ctx.save();
  ctx.translate(sx,sy);

  // Background
  ctx.fillStyle='#000';
  ctx.fillRect(-10,-10,W+20,H+20);

  // Nebulas
  nebulas.forEach(n=>{
    const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    g.addColorStop(0,`hsla(${n.hue},80%,30%,0.08)`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill();
  });

  // Stars
  stars.forEach(s=>{
    const tw=(Math.sin(frame*0.02+s.bright*10)+1)*0.3+0.4;
    ctx.fillStyle=`rgba(255,255,255,${s.s/3*tw})`;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.s/2,0,Math.PI*2); ctx.fill();
  });

  if(state==='title') { drawTitle(); ctx.restore(); return; }

  // Ring particles (draw first)
  particles.filter(p=>p.type==='ring').forEach(p=>{
    ctx.save();
    ctx.globalAlpha=p.life/p.maxLife*0.7;
    ctx.strokeStyle=p.color;
    ctx.lineWidth=3;
    ctx.shadowBlur=15; ctx.shadowColor=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  });

  // Spark particles
  particles.filter(p=>p.type==='spark').forEach(p=>{
    const a=p.life/p.maxLife;
    ctx.save();
    ctx.globalAlpha=a;
    ctx.fillStyle=p.color;
    ctx.shadowBlur=8; ctx.shadowColor=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Power-ups
  powerUps.forEach(p=>{
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(p.angle);
    const c=POWERUP_COLORS[p.type];
    ctx.shadowBlur=12; ctx.shadowColor=c;
    ctx.strokeStyle=c; ctx.lineWidth=2;
    ctx.beginPath();
    for(let i=0;i<6;i++){
      const a=(i/6)*Math.PI*2, r=i%2===0?12:7;
      i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath(); ctx.stroke();
    ctx.fillStyle=c; ctx.globalAlpha=0.3; ctx.fill();
    ctx.globalAlpha=1;
    ctx.font='bold 9px Courier New'; ctx.textAlign='center'; ctx.fillStyle=c;
    ctx.fillText(POWERUP_LABELS[p.type],0,3);
    ctx.restore();
  });

  // Enemy bullets
  eBullets.forEach(b=>{
    ctx.save();
    ctx.shadowBlur=12; ctx.shadowColor=b.color||'#f0f';
    ctx.fillStyle=b.color||'#f0f';
    ctx.beginPath(); ctx.arc(b.x,b.y,(b.w||8)/2,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Player bullets
  bullets.forEach(b=>{
    ctx.save();
    ctx.shadowBlur=14; ctx.shadowColor='#ff0';
    ctx.fillStyle='#ff0';
    const len=Math.hypot(b.vx,b.vy)/14*14;
    ctx.translate(b.x,b.y);
    ctx.rotate(Math.atan2(b.vy,b.vx)+Math.PI/2);
    ctx.fillRect(-2,-len/2,4,len);
    ctx.restore();
  });

  // Enemies
  enemies.forEach(drawEnemy);

  // Boss
  if(boss) drawBoss(boss);

  // Player
  if(!(player.invincible>0&&Math.floor(frame/4)%2===0)) drawPlayer();

  // Player shield
  if(player.shieldHp>0){
    ctx.save();
    const sc=player.shieldHp/3;
    ctx.globalAlpha=0.3+sc*0.3;
    ctx.strokeStyle='#0ff'; ctx.lineWidth=3;
    ctx.shadowBlur=20; ctx.shadowColor='#0ff';
    ctx.beginPath(); ctx.arc(player.x,player.y,26+Math.sin(frame*0.1)*3,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // HUD
  drawHUD();

  // Combo texts
  comboTexts.forEach(t=>{
    ctx.save();
    ctx.globalAlpha=t.life/t.maxLife;
    ctx.fillStyle=t.color;
    ctx.shadowBlur=8; ctx.shadowColor=t.color;
    ctx.font=`bold 14px Courier New`;
    ctx.textAlign='center';
    ctx.fillText(t.text,t.x,t.y);
    ctx.restore();
  });

  // Screen flash
  if(flashAlpha>0.01){
    ctx.save();
    ctx.globalAlpha=flashAlpha;
    ctx.fillStyle=flashColor;
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  if(state==='gameover') drawGameOver();

  ctx.restore(); // end shake
}

function drawPlayer() {
  ctx.save();
  ctx.translate(player.x, player.y);
  // Engine trail
  const ef = player.engineFlicker < 3;
  ctx.shadowBlur=ef?20:10; ctx.shadowColor=ef?'#f0f':'#808';
  ctx.fillStyle=ef?'#f0f':'#808';
  ctx.beginPath();
  ctx.ellipse(0, player.h/2+2, player.w/5, ef?player.h/5:player.h/8, 0, 0, Math.PI*2);
  ctx.fill();
  if(player.powerLevel>=1){
    ctx.beginPath(); ctx.ellipse(-12,player.h/2+2,4,ef?8:5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( 12,player.h/2+2,4,ef?8:5,0,0,Math.PI*2); ctx.fill();
  }
  // Body
  const hue=player.powerLevel*30;
  ctx.shadowBlur=16; ctx.shadowColor=`hsl(${180+hue},100%,70%)`;
  ctx.fillStyle=`hsl(${180+hue},100%,65%)`;
  ctx.beginPath();
  ctx.moveTo(0,-player.h/2);
  ctx.lineTo(player.w/2, player.h/3);
  ctx.lineTo(player.w/3, player.h/2);
  ctx.lineTo(-player.w/3,player.h/2);
  ctx.lineTo(-player.w/2,player.h/3);
  ctx.closePath(); ctx.fill();
  // Cockpit
  ctx.fillStyle=`hsl(${200+hue},100%,85%)`;
  ctx.beginPath(); ctx.ellipse(0,-player.h/6,6,9,0,0,Math.PI*2); ctx.fill();
  // Wing accents
  ctx.strokeStyle=`hsl(${180+hue},100%,85%)`; ctx.lineWidth=1.5;
  ctx.shadowBlur=8;
  ctx.beginPath(); ctx.moveTo(-player.w/2,player.h/3); ctx.lineTo(-player.w/6,-player.h/6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( player.w/2,player.h/3); ctx.lineTo( player.w/6,-player.h/6); ctx.stroke();
  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x,e.y);
  ctx.rotate(e.angle);
  ctx.shadowBlur=12; ctx.shadowColor=e.color;
  ctx.fillStyle=e.color;
  if(e.type==='speeder'){
    ctx.beginPath();
    ctx.moveTo(0,-e.h/2); ctx.lineTo(e.w/3,e.h/2); ctx.lineTo(-e.w/3,e.h/2);
    ctx.closePath(); ctx.fill();
  } else if(e.type==='tank'){
    ctx.fillRect(-e.w/2,-e.h/2,e.w,e.h);
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.fillRect(-e.w/2+3,-e.h/2+3,e.w-6,e.h-6);
  } else if(e.type==='sniper'){
    ctx.beginPath();
    ctx.moveTo(0,-e.h/2); ctx.lineTo(e.w/4,0); ctx.lineTo(e.w/2,e.h/2);
    ctx.lineTo(-e.w/2,e.h/2); ctx.lineTo(-e.w/4,0);
    ctx.closePath(); ctx.fill();
  } else {
    ctx.beginPath();
    ctx.moveTo(0,-e.h/2); ctx.lineTo(e.w/2,0);
    ctx.lineTo(0,e.h/2); ctx.lineTo(-e.w/2,0);
    ctx.closePath(); ctx.fill();
  }
  if(e.maxHp>1){
    ctx.rotate(-e.angle);
    const bw=e.w+10;
    ctx.fillStyle='#400'; ctx.fillRect(-bw/2,e.h/2+5,bw,4);
    ctx.fillStyle=e.color; ctx.fillRect(-bw/2,e.h/2+5,bw*(e.hp/e.maxHp),4);
  }
  ctx.restore();
}

function drawBoss(b) {
  ctx.save();
  ctx.translate(b.x,b.y);
  const hp_pct=b.hp/b.maxHp;
  const glowStr=20+Math.sin(frame*0.1)*10;

  // Core body
  ctx.shadowBlur=glowStr; ctx.shadowColor=b.color1;
  ctx.fillStyle=b.color1;
  ctx.beginPath();
  ctx.ellipse(0,0,b.w/2,b.h/2,0,0,Math.PI*2);
  ctx.fill();

  // Rotating arms
  ctx.rotate(b.angle);
  for(let i=0;i<4;i++){
    ctx.save();
    ctx.rotate((i/4)*Math.PI*2);
    ctx.shadowColor=b.color2; ctx.fillStyle=b.color2;
    ctx.fillRect(-8,-b.h/2-20,16,22);
    ctx.fillRect(-4,-b.h/2-24,8,8);
    ctx.restore();
  }
  ctx.rotate(-b.angle);

  // Eye / core
  ctx.shadowBlur=30; ctx.shadowColor='#fff';
  ctx.fillStyle=hp_pct>0.5?'#fff':(hp_pct>0.25?'#f80':'#f00');
  ctx.beginPath(); ctx.arc(0,0,12+Math.sin(frame*0.15)*3,0,Math.PI*2); ctx.fill();

  // HP bar
  const bw=b.w*1.6;
  ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(-bw/2,-b.h/2-22,bw,10);
  ctx.fillStyle=hp_pct>0.5?'#0f0':(hp_pct>0.25?'#ff0':'#f00');
  ctx.shadowBlur=6; ctx.shadowColor=ctx.fillStyle;
  ctx.fillRect(-bw/2,-b.h/2-22,bw*hp_pct,10);
  ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.strokeRect(-bw/2,-b.h/2-22,bw,10);

  // BOSS label
  ctx.fillStyle='#fff'; ctx.font='bold 11px Courier New';
  ctx.textAlign='center'; ctx.shadowBlur=0;
  ctx.fillText(`BOSS  ${b.hp}/${b.maxHp}`,-0,-b.h/2-26);
  ctx.restore();
}

function drawHUD() {
  ctx.save();
  // Score
  ctx.fillStyle='#0ff'; ctx.font='bold 15px Courier New';
  ctx.shadowBlur=8; ctx.shadowColor='#0ff';
  ctx.textAlign='left'; ctx.fillText(`SCORE ${score}`,8,22);
  ctx.textAlign='right'; ctx.fillText(`BEST ${hiScore}`,W-8,22);

  // Lives
  for(let i=0;i<lives;i++){
    ctx.fillStyle='#0ff'; ctx.shadowColor='#0ff'; ctx.shadowBlur=6;
    const lx=10+i*20, ly=H-16;
    ctx.beginPath(); ctx.moveTo(lx,ly-8); ctx.lineTo(lx+7,ly+4);
    ctx.lineTo(lx,ly+1); ctx.lineTo(lx-7,ly+4); ctx.closePath(); ctx.fill();
  }

  // Bombs
  for(let i=0;i<bombs;i++){
    ctx.fillStyle='#f80'; ctx.shadowColor='#f80'; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(W-14-i*20,H-16,5,0,Math.PI*2); ctx.fill();
  }

  // Power level bar
  const pw=60; const ph=6;
  ctx.fillStyle='rgba(255,255,0,0.2)'; ctx.fillRect(W/2-pw/2,H-26,pw,ph);
  ctx.fillStyle='#ff0'; ctx.shadowColor='#ff0'; ctx.shadowBlur=6;
  ctx.fillRect(W/2-pw/2,H-26,pw*(player.powerLevel/3),ph);
  ctx.font='9px Courier New'; ctx.fillStyle='#ff0'; ctx.textAlign='center';
  ctx.fillText('PWR',W/2,H-30);

  // Multiplier
  if(multiplier>1){
    ctx.font=`bold 13px Courier New`;
    ctx.fillStyle=`hsl(${combo*15},100%,65%)`;
    ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=10;
    ctx.textAlign='center';
    ctx.fillText(`x${multiplier.toFixed(1)} MULTI`,W/2,42);
  }

  // Stage
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='11px Courier New';
  ctx.textAlign='right'; ctx.shadowBlur=0;
  ctx.fillText(`STAGE ${stageNum}`,W-8,38);

  // Bomb cooldown indicator
  if(bombCooldown>0){
    ctx.fillStyle='rgba(255,136,0,0.4)'; ctx.textAlign='center';
    ctx.font='10px Courier New'; ctx.fillText('BOMB RELOADING...',W/2,H-8);
  }

  // Shield pips
  for(let i=0;i<player.shieldHp;i++){
    ctx.strokeStyle='#0ff'; ctx.lineWidth=2; ctx.shadowColor='#0ff'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(W/2-20+i*20,H-10,5,0,Math.PI*2); ctx.stroke();
  }

  ctx.restore();
}

function drawTitle() {
  // Animated title
  const t=frame;
  ctx.save();
  ctx.textAlign='center';

  // Glow pulse
  const pulse=Math.sin(t*0.05)*8+20;
  ctx.shadowBlur=pulse; ctx.shadowColor='#0ff';
  ctx.fillStyle='#0ff';
  ctx.font=`bold 46px Courier New`;
  ctx.fillText('GALACTIC', W/2, H/2-100);
  ctx.shadowColor='#f0f'; ctx.shadowBlur=pulse+5;
  ctx.fillStyle='#f0f';
  ctx.font='bold 46px Courier New';
  ctx.fillText('STRIKER', W/2, H/2-55);

  // Subtitle
  ctx.shadowBlur=0; ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.font='13px Courier New';
  ctx.fillText('── ULTIMATE EDITION ──', W/2, H/2-20);

  // Controls
  ctx.fillStyle='#aaa'; ctx.font='14px Courier New';
  ctx.fillText('WASD / 矢印キー  移動', W/2, H/2+30);
  ctx.fillText('SPACE / Z  射撃', W/2, H/2+54);
  ctx.fillText('X / SHIFT  ボム爆発', W/2, H/2+78);
  ctx.fillText('スマホ: スワイプ移動  タップ射撃', W/2, H/2+102);

  // Blink start
  const blink=Math.sin(t*0.1)>0;
  ctx.fillStyle=blink?'#ff0':'#f80';
  ctx.shadowBlur=blink?12:0; ctx.shadowColor='#ff0';
  ctx.font='bold 18px Courier New';
  ctx.fillText('SPACE / クリック でスタート', W/2, H/2+148);

  // Hi-score
  if(hiScore>0){
    ctx.shadowBlur=0; ctx.fillStyle='#0ff';
    ctx.font='14px Courier New';
    ctx.fillText(`HI SCORE: ${hiScore}`, W/2, H/2+180);
  }
  ctx.restore();
}

function drawGameOver() {
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(0,0,W,H);

  ctx.textAlign='center';
  ctx.shadowBlur=25; ctx.shadowColor='#f00';
  ctx.fillStyle='#f00';
  ctx.font='bold 52px Courier New';
  ctx.fillText('GAME OVER', W/2, H/2-70);

  ctx.shadowColor='#fff'; ctx.shadowBlur=8;
  ctx.fillStyle='#fff'; ctx.font='22px Courier New';
  ctx.fillText(`SCORE: ${score}`, W/2, H/2-10);
  ctx.fillText(`BEST:  ${hiScore}`, W/2, H/2+24);
  ctx.fillText(`STAGE: ${stageNum}`, W/2, H/2+58);

  const blink=Math.sin(frame*0.1)>0;
  ctx.fillStyle=blink?'#ff0':'#f80';
  ctx.shadowColor='#ff0'; ctx.shadowBlur=blink?12:0;
  ctx.font='bold 17px Courier New';
  ctx.fillText('SPACE / クリック でリスタート', W/2, H/2+108);
  ctx.restore();
}

// ── Loop ──────────────────────────────────────────────────────────
function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
